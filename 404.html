<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motify — Page Not Found</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/ic_motify.svg">
    <style>
        :root {
            --primary: #FF4D6D;
            --primary-light: #FF4D6D;
            --text: #f5f5f5;
            --text-muted: #b0b0b0;
            --bg: #0F1115;
            --border: #2a2f3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            width: 100%;
            background: rgba(15, 17, 21, 0.9);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }

        nav .nav-inner {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: center;
        }

        .logo {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img { height: 32px; width: 32px; border-radius: 8px; }
        .logo span { color: var(--primary-light); }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }

        .error-code {
            font-size: 6em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #FF6B8A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.6em;
            font-weight: 600;
            margin-bottom: 12px;
        }

        p {
            color: var(--text-muted);
            font-size: 1.05em;
            margin-bottom: 32px;
        }

        .back-btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95em;
            transition: opacity 0.2s;
        }

        .back-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <script>
    (function() {
        var path = window.location.pathname;
        if (path.indexOf('/go/') === 0 && path.length > 4) {
            var code = path.substring(4).replace(/\/$/, '');
            if (code) {
                window.location.replace('/go/?code=' + encodeURIComponent(code));
            }
        }
    })();
    </script>
    <nav>
        <div class="nav-inner">
            <a href="/" class="logo"><img src="/ic_motify.svg" alt="Motify">Moti<span>fy</span></a>
        </div>
    </nav>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Page not found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="back-btn">Back to Motify</a>
    </div>
</body>
</html>
